<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>R & G Substitution Race</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#eef6ff;
  text-align:center;
  padding:18px;
}
.card{
  max-width:1200px;
  margin:auto;
}
h1{color:#15306b;}
button,input{
  padding:10px 14px;
  margin:5px;
  border-radius:10px;
  font-size:15px;
}
button{
  border:none;
  color:white;
  background:#2563eb;
  cursor:pointer;
  font-weight:bold;
}
.correct{background:#16a34a;}
.incorrect{background:#dc2626;}
.board{
  position:relative;
  width:1100px;
  height:780px;
  margin:10px auto;
  background:#dbeafe;
  border-radius:40px;
  overflow:hidden;
}
.space{
  position:absolute;
  width:96px;
  height:52px;
  border:3px solid #334155;
  border-radius:14px;
  background:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:13px;
  font-weight:bold;
  transform:translate(-50%,-50%);
}
.safe{background:#dcfce7;border-color:#16a34a;}
.risky{background:#fef9c3;border-color:#ca8a04;}
.danger{background:#fee2e2;border-color:#dc2626;}
.finish{background:#bbf7d0;border-color:#111827;}
.current-space{outline:5px solid #facc15;}
.token{
  position:absolute;
  width:34px;
  height:34px;
  border-radius:50%;
  background:#facc15;
  border:3px solid black;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  transform:translate(-50%,-50%);
  z-index:20;
}
.centre{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  border:5px solid #1e3a8a;
  border-radius:28px;
  padding:25px;
  width:360px;
}
.dice-row{
  display:flex;
  justify-content:center;
  gap:35px;
  margin:12px;
}
.die{
  width:80px;
  height:80px;
  border-radius:16px;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:36px;
  font-weight:bold;
}
.red{background:#ef4444;}
.green{background:#22c55e;}
.info{
  font-size:22px;
  font-weight:bold;
  margin:8px;
}
.answer{
  color:#16a34a;
}
.panel{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:12px;
  margin-top:12px;
}
.box{
  background:white;
  border:2px solid #93a4c7;
  border-radius:14px;
  padding:12px;
  min-width:220px;
}
.team-list{
  text-align:left;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="card">

<h1>🎲 R & G Substitution Race</h1>

<input id="teamInput" placeholder="Team name">
<button onclick="addTeam()">Add Team</button>
<button onclick="resetGame()">Reset</button>

<div class="board" id="board">
  <div class="centre">
    <h2>Rules</h2>
    <p>Roll the red die for <b>R</b>.</p>
    <p>Roll the green die for <b>G</b>.</p>
    <p>Substitute into your space.</p>
    <p>The answer is your movement.</p>
    <p>Negative answers move backwards.</p>
    <p>You must land exactly on finish.</p>
  </div>
</div>

<div class="panel">
  <div class="box">
    <h3>Dice</h3>
    <div class="dice-row">
      <div class="die red" id="redDie">R</div>
      <div class="die green" id="greenDie">G</div>
    </div>
  </div>

  <div class="box">
    <h3>Current Turn</h3>
    <div class="info" id="turnText">None</div>
  </div>

  <div class="box">
    <h3>Question</h3>
    <div class="info" id="question">Press Roll Dice</div>
    <div class="info answer" id="answer"></div>
  </div>

  <div class="box">
    <h3>Teams</h3>
    <div class="team-list" id="teamList">No teams yet</div>
  </div>
</div>

<br>

<button onclick="rollDice()">🎲 Roll Dice</button>
<button onclick="showAnswer()">👁 Reveal Answer</button>
<button class="correct" onclick="correctAnswer()">✔ Correct and Move</button>
<button class="incorrect" onclick="nextTurn()">✖ Incorrect / Next Turn</button>

</div>

<script>
let teams = [];
let currentTeam = 0;
let redValue = 0;
let greenValue = 0;
let currentAnswer = 0;
let moveAmount = 0;
let rolled = false;

const spaces = [
  { text:"START", type:"safe", calc:(r,g)=>r+g },
  { text:"R + G", type:"safe", calc:(r,g)=>r+g },
  { text:"RG", type:"safe", calc:(r,g)=>r*g },
  { text:"R²", type:"safe", calc:(r,g)=>r*r },
  { text:"G²", type:"safe", calc:(r,g)=>g*g },
  { text:"R - G", type:"risky", calc:(r,g)=>r-g },
  { text:"G - R", type:"risky", calc:(r,g)=>g-r },
  { text:"2R", type:"safe", calc:(r,g)=>2*r },
  { text:"2G", type:"safe", calc:(r,g)=>2*g },
  { text:"R + 2G", type:"safe", calc:(r,g)=>r+2*g },
  { text:"2R + G", type:"safe", calc:(r,g)=>2*r+g },
  { text:"R² + G", type:"safe", calc:(r,g)=>r*r+g },
  { text:"G² + R", type:"safe", calc:(r,g)=>g*g+r },
  { text:"2R - G", type:"risky", calc:(r,g)=>2*r-g },
  { text:"2G - R", type:"risky", calc:(r,g)=>2*g-r },
  { text:"RG + R", type:"safe", calc:(r,g)=>r*g+r },
  { text:"RG + G", type:"safe", calc:(r,g)=>r*g+g },
  { text:"R - 2G", type:"danger", calc:(r,g)=>r-2*g },
  { text:"G - 2R", type:"danger", calc:(r,g)=>g-2*r },
  { text:"2RG", type:"safe", calc:(r,g)=>2*r*g },
  { text:"R² + G²", type:"safe", calc:(r,g)=>r*r+g*g },
  { text:"RG - R²", type:"danger", calc:(r,g)=>r*g-r*r },
  { text:"RG - G²", type:"danger", calc:(r,g)=>r*g-g*g },
  { text:"R² - RG", type:"risky", calc:(r,g)=>r*r-r*g },
  { text:"G² - RG", type:"risky", calc:(r,g)=>g*g-r*g },
  { text:"3R + G", type:"safe", calc:(r,g)=>3*r+g },
  { text:"3G + R", type:"safe", calc:(r,g)=>3*g+r },
  { text:"3R - 2G", type:"risky", calc:(r,g)=>3*r-2*g },
  { text:"3G - 2R", type:"risky", calc:(r,g)=>3*g-2*r },
  { text:"R² + 2G", type:"safe", calc:(r,g)=>r*r+2*g },
  { text:"G² + 2R", type:"safe", calc:(r,g)=>g*g+2*r },
  { text:"R - G²", type:"danger", calc:(r,g)=>r-g*g },
  { text:"G - R²", type:"danger", calc:(r,g)=>g-r*r },
  { text:"2R² + G", type:"safe", calc:(r,g)=>2*r*r+g },
  { text:"2G² + R", type:"safe", calc:(r,g)=>2*g*g+r },
  { text:"🏁 FINISH", type:"finish" }
];

const finishLine = spaces.length - 1;

const positions = [
  [90,70],[205,70],[320,70],[435,70],[550,70],[665,70],[780,70],[895,70],[1010,70],
  [1010,145],[1010,220],[1010,295],[1010,370],[1010,445],[1010,520],[1010,595],[1010,670],
  [895,710],[780,710],[665,710],[550,710],[435,710],[320,710],[205,710],[90,710],
  [90,645],[90,580],[90,515],[90,450],[90,385],[90,320],[90,255],[90,190],[90,125],
  [205,125],[320,125]
];

function addTeam(){
  const name = document.getElementById("teamInput").value.trim();
  if(name === "") return;

  teams.push({name:name, position:0});
  document.getElementById("teamInput").value = "";

  updateTurn();
  renderBoard();
}

function rollDice(){
  if(teams.length === 0) return;

  redValue = Math.floor(Math.random()*6)+1;
  greenValue = Math.floor(Math.random()*6)+1;
  rolled = true;

  document.getElementById("redDie").innerText = redValue;
  document.getElementById("greenDie").innerText = greenValue;

  const team = teams[currentTeam];
  const space = spaces[team.position];

  currentAnswer = space.calc(redValue, greenValue);
  moveAmount = currentAnswer;

  document.getElementById("question").innerHTML =
    `${team.name}: ${space.text}`;

  document.getElementById("answer").innerHTML = "";
}

function showAnswer(){
  if(!rolled) return;

  let direction = moveAmount >= 0 ? "forward" : "backward";

  document.getElementById("answer").innerHTML =
    `Answer = ${currentAnswer}<br>Move ${Math.abs(moveAmount)} spaces ${direction}`;
}

function correctAnswer(){
  if(teams.length === 0 || !rolled) return;

  let team = teams[currentTeam];
  let newPosition = team.position + moveAmount;

  if(newPosition < 0){
    newPosition = 0;
  }

  if(newPosition > finishLine){
    const extra = newPosition - finishLine;
    newPosition = finishLine - extra;
  }

  team.position = newPosition;
  renderBoard();

  if(team.position === finishLine){
    alert(team.name + " wins!");
    return;
  }

  nextTurn();
}

function nextTurn(){
  if(teams.length === 0) return;

  rolled = false;
  currentAnswer = 0;
  moveAmount = 0;

  currentTeam = (currentTeam + 1) % teams.length;

  document.getElementById("question").innerHTML = "Press Roll Dice";
  document.getElementById("answer").innerHTML = "";

  updateTurn();
  renderBoard();
}

function updateTurn(){
  if(teams.length === 0){
    document.getElementById("turnText").innerHTML = "None";
  }else{
    document.getElementById("turnText").innerHTML = teams[currentTeam].name;
  }
}

function renderBoard(){
  const board = document.getElementById("board");
  board.querySelectorAll(".space,.token").forEach(e => e.remove());

  spaces.forEach((space,index)=>{
    const tile = document.createElement("div");
    tile.className = "space " + space.type;
    tile.innerHTML = space.text;

    if(teams[currentTeam] && teams[currentTeam].position === index){
      tile.classList.add("current-space");
    }

    tile.style.left = positions[index][0] + "px";
    tile.style.top = positions[index][1] + "px";

    board.appendChild(tile);
  });

  teams.forEach((team,index)=>{
    const pos = positions[team.position];

    const token = document.createElement("div");
    token.className = "token";
    token.innerHTML = team.name.charAt(0).toUpperCase();

    token.style.left = (pos[0] + 36 + index * 10) + "px";
    token.style.top = (pos[1] + 28 + index * 5) + "px";

    board.appendChild(token);
  });

  renderTeamList();
}

function renderTeamList(){
  const list = document.getElementById("teamList");

  if(teams.length === 0){
    list.innerHTML = "No teams yet";
    return;
  }

  list.innerHTML = teams.map(team =>
    `${team.name}: Space ${team.position}`
  ).join("<br>");
}

function resetGame(){
  teams = [];
  currentTeam = 0;
  redValue = 0;
  greenValue = 0;
  currentAnswer = 0;
  moveAmount = 0;
  rolled = false;

  document.getElementById("redDie").innerText = "R";
  document.getElementById("greenDie").innerText = "G";
  document.getElementById("question").innerHTML = "Press Roll Dice";
  document.getElementById("answer").innerHTML = "";
  document.getElementById("turnText").innerHTML = "None";

  renderBoard();
}

renderBoard();
</script>

</body>
</html>
